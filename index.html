<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Kiếm Code Stack</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ffffff;
            padding: 20px;
            box-sizing: border-box;
        }

        .search-modal {
            background-color: #22273e;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            padding: 25px 30px;
            width: 450px;
            text-align: center;
        }

        .search-title {
            color: #9086d7;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 12px;
            background-color: #1c2030;
            border: 1px solid #333d61;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
        }

        .search-input::placeholder {
            color: #58607a;
        }

        .search-btn {
            width: 100%;
            padding: 12px;
            background-color: #7260db;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .search-btn:hover {
            background-color: #6152bc;
        }

        /* Khung hiển thị kết quả */
        .result-box {
            margin-top: 20px;
            background-color: #1c2030;
            border: 1px solid #333d61;
            border-radius: 6px;
            padding: 15px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
            display: none;
            /* Ẩn đi khi chưa tìm */
        }

        .result-item {
            padding: 6px 0;
            border-bottom: 1px solid #282f4d;
            word-break: break-all;
            color: #b5adf6;
        }

        .result-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <div class="search-modal">
        <h1 class="search-title">Tìm Kiếm Code Stack</h1>

        <input type="text" id="dirInput" class="search-input" placeholder="Nhập đường dẫn thư mục (VD: C:\Users\...)">
        <input type="text" id="fileInput" class="search-input" placeholder="Nhập tên file muốn tìm...">

        <button type="button" id="searchBtn" class="search-btn">Tìm kiếm</button>

        <div id="resultBox" class="result-box"></div>
    </div>

    <script>
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const dirPath = document.getElementById('dirInput').value.trim();
            const fileName = document.getElementById('fileInput').value.trim();
            const resultBox = document.getElementById('resultBox');

            if (!dirPath || !fileName) {
                alert('Vui lòng nhập đầy đủ cả Thư mục và Tên file!');
                return;
            }

            // Hiển thị trạng thái đang tìm
            resultBox.style.display = "block";
            resultBox.innerHTML = "🔍 Đang quét hệ thống, vui lòng đợi...";

            try {
                // Gọi API gửi tới Python Server
                const response = await fetch(`/api/search?dir=${encodeURIComponent(dirPath)}&file=${encodeURIComponent(fileName)}`);
                const data = await response.json();

                if (data.status === "success") {
                    if (data.results.length === 0) {
                        resultBox.innerHTML = "❌ Không tìm thấy file nào khớp với từ khóa.";
                    } else {
                        resultBox.innerHTML = `<strong style="color: #9086d7;">Đã tìm thấy ${data.results.length} file:</strong><br>` +
                            data.results.map(path => `<div class="result-item">${path}</div>`).join('');
                    }
                } else {
                    resultBox.innerHTML = `❌ Lỗi: ${data.message}`;
                }
            } catch (error) {
                resultBox.innerHTML = "❌ Lỗi kết nối đến Python Server!";
            }
        });
    </script>
</body>

</html>
